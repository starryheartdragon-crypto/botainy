name: Deploy Cloudflare Worker

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

jobs:
  deploy-preview:
    if: ${{ (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork) || (github.event_name == 'workflow_dispatch' && inputs.target == 'preview') }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WRANGLER_LOG: debug
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY OPENROUTER_API_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret/env: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Set required GitHub repository secrets before deploy."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify Wrangler auth
        run: npx wrangler whoami

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext bundle
        run: npm run build:cf

      - name: Ensure OpenRouter secret (preview)
        run: echo "$OPENROUTER_API_KEY" | npx wrangler secret put OPENROUTER_API_KEY --env preview

      - name: Deploy preview
        run: npx opennextjs-cloudflare deploy --env preview

  deploy-production:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'production') }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WRANGLER_LOG: debug
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0
          for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY OPENROUTER_API_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret/env: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Set required GitHub repository secrets before deploy."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify Wrangler auth
        run: npx wrangler whoami

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext bundle
        run: npm run build:cf

      - name: Ensure OpenRouter secret (production)
        run: echo "$OPENROUTER_API_KEY" | npx wrangler secret put OPENROUTER_API_KEY --env production

      - name: Deploy production
        run: npx opennextjs-cloudflare deploy --env production
